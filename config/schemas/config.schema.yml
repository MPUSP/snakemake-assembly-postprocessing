$schema: "https://json-schema.org/draft/2020-12/schema"
title: "Config Schema"
description: "Config schema for the assembly post-processing workflow"
type: object
properties:
  samplesheet:
    type: string
    description: Path to the sample sheet in CSV format
    default: "config/samples.csv"
  tool:
    type: array
    description: Annotation tool(s) to use
    default: ["prokka"]
    items:
      type: string
      description: Name of the annotation tool
      default: "prokka"
      enum:
        - prokka
        - pgap
        - bakta
  reference:
    type: object
    properties:
      fasta:
        type: string
        description: Path to the reference genome in FASTA format
        default: ""
      gff:
        type: string
        description: Path to the reference annotation in GFF format (optional)
        default: ""
    required:
      - fasta
  pgap:
    type: object
    properties:
      bin:
        type: string
        description: Path to the PGAP script
        default: "path/to/pgap.py"
      use_yaml_config:
        type: boolean
        description: Whether to use YAML configuration for PGAP
        default: true
      prepare_yaml_files:
        type: object
        properties:
          generic:
            type: string
            description: Path to the generic YAML configuration file
            default: "config/generic.yaml"
          submol:
            type: string
            description: Path to the submol YAML configuration file
            default: "config/submol.yaml"
        required:
          - generic
          - submol
    required:
      - bin
      - use_yaml_config
      - prepare_yaml_files
  prokka:
    type: object
    properties:
      center:
        type: string
        description: Center name for Prokka annotation (used in sequence IDs)
        default: ""
      extra:
        type: string
        description: Extra command-line arguments for Prokka
        default: "--addgenes"
    required:
      - center
      - extra
  bakta:
    type: object
    properties:
      download_db:
        type: string
        description: Bakta database type, one of 'full', 'light', or 'none' if existing is used
        default: "light"
      existing_db:
        type: string
        description: Path to an existing Bakta database (optional)
        default: ""
      extra:
        type: string
        description: Extra command-line arguments for Bakta
        default: "--keep-contig-headers --compliant"
    required:
      - download_db
      - existing_db
      - extra
  quast:
    type: object
    properties:
      extra:
        type: string
        description: Extra command-line arguments for QUAST
        default: ""
    required:
      - extra
  panaroo:
    type: object
    properties:
      skip:
        type: boolean
        description: Whether to skip Panaroo analysis
        default: false
      remove_source:
        type: string
        description: Source types to remove in Panaroo (regex supported)
        default: "cmsearch"
      remove_feature:
        type: string
        description: Feature types to remove in Panaroo (regex supported)
        default: "tRNA|rRNA|ncRNA|exon|sequence_feature"
      extra:
        type: string
        description: Extra command-line arguments for Panaroo
        default: "--clean-mode strict --remove-invalid-genes"
  fastani:
    type: object
    properties:
      skip:
        type: boolean
        description: Whether to skip FastANI analysis
        default: false
      extra:
        type: string
        description: Extra command-line arguments for FastANI
        default: ""
  rgi:
    type: object
    properties:
      skip:
        type: boolean
        description: Whether to skip RGI analysis
        default: false
      extra:
        type: string
        description: Extra command-line arguments for RGI
        default: "--clean --alignment_tool DIAMOND"
  synteny:
    type: object
    properties:
      skip:
        type: boolean
        description: Whether to skip synteny analysis
        default: false
      divergence:
        type: number
        description: Maximum divergence range between genomes for synteny analysis
        default: 1
      prefix:
        type: string
        description: Prefix for synteny output files
        default: "ntSynt"
      extra:
        type: string
        description: Extra command-line arguments for synteny analysis
        default: ""
      viz_scale:
        type: string
        description: Scale for synteny visualization (e.g., "1e6")
        default: "1e6"
      viz_extra:
        type: string
        description: Extra command-line arguments for synteny visualization
        default: "--normalize --format pdf"
required:
  - samplesheet
  - tool
  - reference
  - pgap
  - prokka
  - bakta
  - quast
  - panaroo
  - fastani
  - rgi
  - synteny
