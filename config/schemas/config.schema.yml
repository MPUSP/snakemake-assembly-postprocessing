$schema: "https://json-schema.org/draft/2020-12/schema"
title: "Config Schema"
description: "Config schema for the assembly post-processing workflow"
type: object
properties:
  samplesheet:
    type: string
    description: Path to the sample sheet file
  tool:
    type: array
    description: Annotation tool to use
    items:
      type: string
      enum:
        - prokka
        - pgap
        - bakta
  pgap:
    type: object
    properties:
      bin:
        type: string
        description: Path to the PGAP script
      use_yaml_config:
        type: boolean
        description: Whether to use YAML configuration for PGAP
      prepare_yaml_files:
        type: object
        properties:
          generic:
            type: string
            description: Path to the generic YAML configuration file
          submol:
            type: string
            description: Path to the submol YAML configuration file
        required:
          - generic
          - submol
    required:
      - bin
      - use_yaml_config
      - prepare_yaml_files
  prokka:
    type: object
    properties:
      center:
        type: string
        description: Center name for Prokka annotation (used in sequence IDs)
      extra:
        type: string
        description: Extra command-line arguments for Prokka
    required:
      - center
      - extra
  bakta:
    type: object
    properties:
      download_db:
        type: string
        description: Bakta database type, one of 'full', 'light', or 'none' if existing is used
      existing_db:
        type: string
        description: Path to an existing Bakta database (optional)
      extra:
        type: string
        description: Extra command-line arguments for Bakta
    required:
      - download_db
      - existing_db
      - extra
  quast:
    type: object
    properties:
      reference:
        type: string
        description: Path to the reference genome for QUAST
      extra:
        type: string
        description: Extra command-line arguments for QUAST

required:
  - samplesheet
  - tool
  - pgap
  - prokka
  - bakta
  - quast
